---
layout: null
---
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>{{ page.title | default: site.brand | default: site.title | escape }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="project-page">
      <header class="project-page__header">
        <a
          class="project-page__home"
          href="{{ '/' | relative_url }}"
          aria-label="Back to home"
        >
          <svg
            class="project-page__home-icon"
            aria-hidden="true"
            focusable="false"
            viewBox="0 0 20 20"
          >
            <path
              d="M12.5 4.5a.75.75 0 0 1 0 1.06L8.06 10l4.44 4.44a.75.75 0 1 1-1.06 1.06l-5-5a.75.75 0 0 1 0-1.06l5-5a.75.75 0 0 1 1.06 0Z"
            />
          </svg>
          <span class="sr-only">Back to home</span>
        </a>
        {% if page.project_meta %}
        <div class="project-page__meta">
          {{ page.project_meta }}
        </div>
        {% endif %}
      </header>
      <main class="project-page__content">
        {{ content }}
      </main>
    </div>
  </body>
</html>
