---
layout: null
---
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    {%- seo -%}
    <script>
      (function () {
        var pageTitle = {{ page.title | default: site.brand | default: site.title | jsonify }};
        if (pageTitle) document.title = pageTitle;
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="content-page">
      <header class="content-page__header">
        <a class="content-page__brand" href="{{ '/' | relative_url }}">
          <span class="content-page__brand-label">
            {{ site.brand | default: site.title | default: "Home" | escape }}
          </span>
        </a>
        <div class="content-page__controls">
          {% include site-nav.html
            nav_class="content-page__nav"
            link_class="content-page__link"
            aria_label="Section navigation"
          %}
        </div>
      </header>
      <main class="content-page__body">
        {{ content }}
      </main>
    </div>
  </body>
</html>
