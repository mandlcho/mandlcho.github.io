---
layout: null
---
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    {%- seo -%}
    <script>
      (function () {
        var pageTitle = {{ page.title | default: site.brand | default: site.title | jsonify }};
        if (pageTitle) document.title = pageTitle;
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <script defer src="{{ '/assets/js/github-projects.js' | relative_url }}"></script>
    <script defer src="{{ '/assets/js/card-parallax.js' | relative_url }}"></script>
    <script defer src="{{ '/assets/js/splat-viewer.js' | relative_url }}"></script>
  </head>
  <body>
    <div class="landing">
      <header class="landing__header">
        <div class="landing__header-inner">
          <h1 class="landing__brand">
            {{ page.hero_title | default: page.title | default: site.brand | default: site.title }}
          </h1>
          <div class="landing__controls">
            {% include site-nav.html %}
          </div>
        </div>
      </header>

      <main class="landing__content">
        {{ content }}
      </main>

      <footer class="landing__footer"></footer>
    </div>
  </body>
</html>
